<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <title>Kółko i Krzyżyk</title>
    <link rel="stylesheet" href="style2.css">
</head>
<body>

<h1>Kółko i Krzyżyk</h1>

<div class="menu">
    <button onclick="startGame(2)">2 graczy</button>
    <button onclick="startGame(1)">1 gracz</button>

    <div id="difficulty" class="hidden">
        <p>Poziom:</p>
        <button onclick="setDifficulty('easy')">Łatwy</button>
        <button onclick="setDifficulty('medium')">Średni</button>
    </div>
</div>

<div id="game" class="hidden">
    <div class="board" id="board"></div>
    <p id="status"></p>
    <button onclick="resetGame()">Reset</button>
</div>

<script src="script.js"></script>
</body>
</html>
